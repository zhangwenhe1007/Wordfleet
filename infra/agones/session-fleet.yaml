apiVersion: agones.dev/v1
kind: Fleet
metadata:
  name: wordfleet-session
  namespace: wordfleet
spec:
  replicas: 10
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: session-server
    spec:
      ports:
        - name: ws
          portPolicy: Dynamic
          containerPort: 8090
          protocol: TCP
      health:
        disabled: true
      template:
        metadata:
          labels:
            app: session-server
        spec:
          containers:
            - name: session-server
              image: us-central1-docker.pkg.dev/wordfleet-487310/wordfleet/session-server:beta
              ports:
                - containerPort: 8090
              env:
                - name: REDIS_HOST
                  value: redis.wordfleet.svc.cluster.local
                - name: REDIS_PORT
                  value: "6379"
                - name: CONTROL_BASE_URL
                  value: http://control-plane.wordfleet.svc.cluster.local
                - name: ROOM_TTL_SECONDS
                  value: "900"
                - name: AGONES_SDK_ENABLED
                  value: "true"
                - name: AGONES_SDK_URL
                  value: http://localhost:9358
                - name: JOIN_TOKEN_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: control-plane-secrets
                      key: JOIN_TOKEN_SECRET
                - name: SESSION_CALLBACK_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: control-plane-secrets
                      key: SESSION_CALLBACK_SECRET
              resources:
                requests:
                  cpu: 200m
                  memory: 256Mi
                limits:
                  cpu: 1
                  memory: 1Gi
