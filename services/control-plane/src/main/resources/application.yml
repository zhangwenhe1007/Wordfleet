server:
  port: ${CONTROL_PORT:8080}

spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

wordfleet:
  join-token-secret: ${JOIN_TOKEN_SECRET:dev-secret}
  session-callback-secret: ${SESSION_CALLBACK_SECRET:dev-callback-secret}
  agones-allocator-url: ${AGONES_ALLOCATOR_URL:}
  session-ws-fallback: ${SESSION_WS_FALLBACK:ws://localhost:8090/ws/room}
  magic-link:
    from: ${MAGIC_LINK_FROM:no-reply@wordfleet.dev}
    base-url: ${MAGIC_LINK_BASE_URL:http://localhost:5173/auth/verify}
    sendgrid-api-key: ${SENDGRID_API_KEY:}
